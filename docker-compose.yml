version: "3.9"

services:
  # ─────────────────────────────────────────
  # API GATEWAY (Traefik)
  # ─────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - saas-network

  # ─────────────────────────────────────────
  # USER / AUTH SERVICE
  # ─────────────────────────────────────────
  user-service:
    build: ./services/user-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://saas:saas_password@postgres-users:5432/users_db
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://saas:saas_password@rabbitmq:5672/
      - SECRET_KEY=super-secret-jwt-key-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=PathPrefix(`/api/users`) || PathPrefix(`/api/auth`)"
      - "traefik.http.services.users.loadbalancer.server.port=8000"
    networks:
      - saas-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE
  # ─────────────────────────────────────────
  notification-service:
    build: ./services/notification-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://saas:saas_password@postgres-notifications:5432/notifications_db
      - REDIS_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://saas:saas_password@rabbitmq:5672/
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-your@email.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-yourpassword}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifications.rule=PathPrefix(`/api/notifications`)"
      - "traefik.http.services.notifications.loadbalancer.server.port=8000"
    networks:
      - saas-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # FILE / MEDIA UPLOAD SERVICE
  # ─────────────────────────────────────────
  file-service:
    build: ./services/file-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://saas:saas_password@postgres-files:5432/files_db
      - REDIS_URL=redis://redis:6379/2
      - RABBITMQ_URL=amqp://saas:saas_password@rabbitmq:5672/
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=saas_minio
      - MINIO_SECRET_KEY=saas_minio_password
      - MINIO_BUCKET=uploads
      - MAX_FILE_SIZE_MB=50
      - SECRET_KEY=super-secret-jwt-key-change-in-production
    depends_on:
      postgres-files:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.files.rule=PathPrefix(`/api/files`)"
      - "traefik.http.services.files.loadbalancer.server.port=8000"
    networks:
      - saas-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # DATABASES — One per service
  # ─────────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas_password
      POSTGRES_DB: users_db
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas_password
      POSTGRES_DB: notifications_db
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d notifications_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  postgres-files:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas_password
      POSTGRES_DB: files_db
    volumes:
      - postgres_files_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d files_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  # ─────────────────────────────────────────
  # REDIS — Shared cache/sessions
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - saas-network

  # ─────────────────────────────────────────
  # RABBITMQ — Async messaging between services
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: saas
      RABBITMQ_DEFAULT_PASS: saas_password
    ports:
      - "15672:15672"   # RabbitMQ management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  # ─────────────────────────────────────────
  # MINIO — S3-compatible file storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: saas_minio
      MINIO_ROOT_PASSWORD: saas_minio_password
    ports:
      - "9001:9001"     # MinIO console
    volumes:
      - minio_data:/data
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge

volumes:
  postgres_users_data:
  postgres_notifications_data:
  postgres_files_data:
  redis_data:
  rabbitmq_data:
  minio_data:
